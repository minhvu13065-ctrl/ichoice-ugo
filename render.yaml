services:
  - type: web
    name: ichoice-ugo-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: http://localhost:3000
      - key: DATABASE_URL
        value: postgresql://user:password@localhost:5432/ichoice_ugo
